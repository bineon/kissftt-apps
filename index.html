<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KISSFTT Apps</title>
  <meta name="description" content="Simple, focused apps by KISSFTT.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#fafafa;color:#1a1a1a;-webkit-font-smoothing:antialiased}
    header{padding:48px 24px 32px;text-align:center}
    header h1{font-size:28px;font-weight:700;letter-spacing:-0.5px}
    header p{margin-top:8px;font-size:15px;color:#666}
    .apps{max-width:800px;margin:0 auto;padding:0 24px 80px;display:grid;grid-template-columns:1fr;gap:16px}
    .app-card{background:#fff;border:1px solid #e8e8e8;border-radius:16px;padding:24px;display:flex;align-items:center;gap:20px;transition:box-shadow .2s;text-decoration:none;color:inherit}
    .app-card:hover{box-shadow:0 4px 24px rgba(0,0,0,.06)}
    .app-icon{width:72px;height:72px;border-radius:16px;flex-shrink:0;overflow:hidden}
    .app-icon img{width:100%;height:100%;object-fit:cover}
    .app-info{flex:1;min-width:0}
    .app-info h2{font-size:18px;font-weight:600}
    .app-info .tagline{font-size:14px;color:#666;margin-top:4px}
    .app-info .platforms{margin-top:8px;display:flex;gap:6px}
    .badge{font-size:11px;font-weight:500;padding:3px 8px;border-radius:6px;background:#f0f0f0;color:#555}
    .app-link{flex-shrink:0}
    .app-link svg{width:20px;height:20px;color:#ccc}
    footer{text-align:center;padding:32px 24px;font-size:13px;color:#999;border-top:1px solid #eee}
    footer a{color:#666;text-decoration:none}
    footer a:hover{text-decoration:underline}
    @media(min-width:600px){header{padding:72px 24px 48px}header h1{font-size:36px}.apps{gap:20px}.app-card{padding:28px}.app-icon{width:80px;height:80px}}
  </style>
</head>
<body>
  <header>
    <h1>KISSFTT</h1>
    <p>Simple, focused apps.</p>
  </header>
  <div class="apps">
    <a class="app-card" href="/mdviewer">
      <div class="app-icon">
        <img src="/icons/mdviewer.png" alt="MDViewer">
      </div>
      <div class="app-info">
        <h2>MDViewer</h2>
        <p class="tagline">A lightweight Markdown reader for iOS.</p>
        <div class="platforms"><span class="badge">iOS</span></div>
      </div>
      <div class="app-link">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.21 14.77a.75.75 0 01.02-1.06L11.168 10 7.23 6.29a.75.75 0 111.04-1.08l4.5 4.25a.75.75 0 010 1.08l-4.5 4.25a.75.75 0 01-1.06-.02z" clip-rule="evenodd"/></svg>
      </div>
    </a>
  </div>
  <footer>
    <p>&copy; 2026 KISSFTT &middot; <a href="mailto:support@kissftt.com">Contact</a> &middot; <a href="/privacy">Privacy</a></p>
  </footer>
</body>
</html>
